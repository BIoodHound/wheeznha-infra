events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Rate limiting — auth endpoints only
    limit_req_zone $binary_remote_addr zone=auth_login:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=auth_register:10m rate=5r/m;

    # Shared proxy headers snippet
    proxy_http_version 1.1;
    proxy_set_header Host            $host;
    proxy_set_header X-Real-IP       $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    server {
        listen 80;
        server_name _;

        # Handle CORS preflight globally
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
            return 404;
        }

        # ── Auth service (public routes only) ────────────────────────────────

        location = /auth/login {
            limit_req zone=auth_login burst=5 nodelay;
            proxy_pass http://auth-service:8081;
        }

        location = /auth/register {
            limit_req zone=auth_register burst=3 nodelay;
            proxy_pass http://auth-service:8081;
        }

        location = /auth/refresh {
            proxy_pass http://auth-service:8081;
        }

        location = /auth/health {
            proxy_pass http://auth-service:8081;
        }

        # /auth/token is INTERNAL ONLY — called directly between Docker services.
        # Block it at the gateway.
        location = /auth/token {
            return 403;
        }

        # Block any other /auth/* routes not explicitly listed
        location /auth/ {
            return 403;
        }

        # ── Shoppinglist service ──────────────────────────────────────────────
        # Hosts the API for list.weeznha.com (fronted by its own Cloudflare tunnel
        # or via a separate nginx vhost). Routes under /list/ proxy to shoppinglist.

        location /list/ {
            proxy_pass http://shoppinglist-service:8080/;
        }

        # ── Wallet service ────────────────────────────────────────────────────

        location /wallet/ {
            proxy_pass http://wallet-service:8080/;
        }

        # ── Palette service ───────────────────────────────────────────────────

        location /palette/ {
            proxy_pass http://palette-service:8080/;
        }
    }
}
