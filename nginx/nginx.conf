events {
    worker_connections 1024;
}

http {
    # Rate limiting — auth endpoints only
    limit_req_zone $binary_remote_addr zone=auth_login:10m    rate=10r/m;
    limit_req_zone $binary_remote_addr zone=auth_register:10m rate=5r/m;

    server {
        listen 80;
        server_name _;

        # Handle CORS preflight
        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $http_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
                add_header Access-Control-Max-Age 86400;
                return 204;
            }
        }

        # --- Auth service (public routes) ---

        location = /auth/login {
            limit_req zone=auth_login burst=5 nodelay;
            proxy_pass         http://auth-service:8081;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location = /auth/register {
            limit_req zone=auth_register burst=3 nodelay;
            proxy_pass         http://auth-service:8081;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }

        location = /auth/refresh {
            proxy_pass         http://auth-service:8081;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        location = /auth/health {
            proxy_pass http://auth-service:8081;
        }

        # /auth/token is INTERNAL ONLY — called directly between Docker services,
        # never through nginx. Block it at the gateway just in case.
        location = /auth/token {
            return 403;
        }

        # Block any other /auth/* routes not explicitly listed
        location /auth/ {
            return 403;
        }

        # --- App services (added as each service is built) ---
        # location /shoppinglist/ {
        #     proxy_pass       http://shoppinglist-service:8082/;
        #     proxy_set_header Host            $host;
        #     proxy_set_header X-Real-IP       $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # }

        # location /wallet/ {
        #     proxy_pass http://wallet-service:8083/;
        # }

        # location /palette/ {
        #     proxy_pass http://palette-service:8084/;
        # }
    }
}
