spring.application.name=auth-service
server.port=8081

spring.datasource.url=jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:weeznha_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=auth

spring.flyway.schemas=auth
spring.flyway.default-schema=auth
spring.flyway.locations=classpath:db/migration

application.security.jwt.private-key-path=${JWT_PRIVATE_KEY_PATH:/keys/jwt-private.pem}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:https://weeznha.com,http://localhost:5173,http://localhost:3000}
