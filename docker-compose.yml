services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-weeznha_db}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/00-init-schemas.sql
    networks:
      - weeznha-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME:-weeznha_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
    build: ./auth-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-weeznha_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://weeznha.com,http://localhost:5173}
    networks:
      - weeznha-net
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # No ports: mapping — auth-service is never directly reachable from outside Docker

  shoppinglist-service:
    build: ./Shoppinglist/backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-weeznha_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8081
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS_SHOPPINGLIST:-http://localhost:3535,https://list.weeznha.com}
    networks:
      - weeznha-net
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  wallet-service:
    build: ./weeznha wallet/backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-weeznha_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8081
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS_WALLET:-http://localhost:3000,https://wallet.weeznha.com}
    networks:
      - weeznha-net
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  palette-service:
    build: ./miniature-palette/backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-weeznha_db}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      AUTH_SERVICE_URL: http://auth-service:8081
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS_PALETTE:-http://localhost:5173,https://palette.weeznha.com}
    networks:
      - weeznha-net
    depends_on:
      postgres:
        condition: service_healthy
      auth-service:
        condition: service_started
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - weeznha-net
    depends_on:
      - auth-service
      - shoppinglist-service
      - wallet-service
      - palette-service
    restart: unless-stopped

networks:
  weeznha-net:
    driver: bridge

volumes:
  postgres_data:
